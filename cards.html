  <script>
    function renderCards() {
      const container = document.getElementById('cards-container');
      const sections = [
        { id: 'major', title: '大アルカナ', subtitle: 'Major Arcana（22枚）', emoji: '🌟', cards: MAJOR_ARCANA },
        { id: 'wands', title: 'ワンド（棒）', subtitle: 'Wands（14枚）', emoji: '🔥', cards: WANDS },
        { id: 'cups', title: 'カップ（聖杯）', subtitle: 'Cups（14枚）', emoji: '💧', cards: CUPS },
        { id: 'swords', title: 'ソード（剣）', subtitle: 'Swords（14枚）', emoji: '💨', cards: SWORDS },
        { id: 'pentacles', title: 'ペンタクル（金貨）', subtitle: 'Pentacles（14枚）', emoji: '🌿', cards: PENTACLES }
      ];
      let html = '';
      sections.forEach((section, sIdx) => {
        html += `<div id="${section.id}"><h2 class="section-title"><span class="section-emoji">${section.emoji}</span>${section.title}<div class="section-subtitle">${section.subtitle}</div></h2><div class="card-grid">`;
        section.cards.forEach((card, cIdx) => {
          const displayName = card.number !== undefined ? `${card.number}. ${card.name}` : card.name;
          html += `<div class="card-item" data-index="${sIdx}-${cIdx}"><div class="card-header" onclick="toggleCard(this)"><span class="card-icon">${card.emoji}</span><div class="card-info"><div class="card-title">${displayName}</div><div class="card-title-en">${card.nameEn}</div></div><span class="card-toggle">▼</span></div><div class="card-detail"><div class="position-block upright"><span class="position-label">☀️ 正位置</span><div class="keyword">【${card.upright.keyword}】</div><div class="meaning">${card.upright.meaning}</div><div class="advice">💡 ${card.upright.advice}</div></div><div class="position-block reversed"><span class="position-label">🌙 逆位置</span><div class="keyword">【${card.reversed.keyword}】</div><div class="meaning">${card.reversed.meaning}</div><div class="advice">💡 ${card.reversed.advice}</div></div></div></div>`;
        });
        html += '</div></div>';
        if (sIdx < sections.length - 1) {
          html += `<div class="section-nav"><a href="#" onclick="window.scrollTo({top:0,behavior:'smooth'});return false;">↑ ページトップ</a><a href="index.html">🔮 無料タロット鑑定</a></div>`;
        }
        if (sIdx === 0 || sIdx === 2) { html += '<div class="adsense-slot"></div>'; }
      });
      container.innerHTML = html;
    }
    function toggleCard(header) { header.closest('.card-item').classList.toggle('open'); }
    function expandAll() { document.querySelectorAll('.card-item').forEach(el => el.classList.add('open')); }
    function collapseAll() { document.querySelectorAll('.card-item').forEach(el => el.classList.remove('open')); }
    window.addEventListener('scroll', () => { document.getElementById('backToTop').classList.toggle('visible', window.scrollY > 500); });
    renderCards();
  </script>
